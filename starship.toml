# ══════════════════════════════════════════════════════════════════
#  ~/.config/starship.toml — Itachi's Starship Prompt
#  Style: your emoji git symbols + layout merged with extended modules
# ══════════════════════════════════════════════════════════════════

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

# ── Prompt layout ─────────────────────────────────────────────────
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$package\
$cmd_duration\
$character"""

right_format = """$time"""

command_timeout = 500

# ── Username ─────────────────────────────────────────────────────
[username]
show_always = true
style_user = "bold yellow"
style_root = "bold red"
format = "[$user](bold yellow)"

# ── Hostname ─────────────────────────────────────────────────────
[hostname]
ssh_only = false
style = "bold dimmed white"
format = "[@$hostname](bold dimmed white):"

# ── Directory ────────────────────────────────────────────────────
[directory]
style = "bold blue"
truncation_length = 3
truncation_symbol = "…/"
format = "[$path]($style) "
read_only = " 󰌾"
read_only_style = "bold red"

[directory.substitutions]
"Documents" = "󰈙 docs"
"Downloads" = " dl"
"Music"     = " music"
"Pictures"  = " pics"
".config"   = " cfg"

# ── Git branch ───────────────────────────────────────────────────
[git_branch]
symbol = "🌱 "
style = "bold purple"
format = "on [\\[$symbol$branch\\]]($style) "
truncation_length = 25
truncation_symbol = "…"

# ── Git status ───────────────────────────────────────────────────
[git_status]
style = "bold cyan"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "🏳️ "
ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked  = "🆕 ${count} "
stashed    = "📦 "
modified   = "📝 ${count} "
staged     = "✅ ${count} "
renamed    = "👅 ${count} "
deleted    = "🗑️ ${count} "

# ── Languages ────────────────────────────────────────────────────
[python]
style = "bold yellow"
format = "via [ $symbol($version)(\\($virtualenv\\))]($style) "
symbol = " "
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]

[nodejs]
style = "bold green"
format = "via [ $symbol($version)]($style) "
symbol = " "
detect_files = ["package.json", ".nvmrc", ".node-version"]

[package]
style = "bold 208"
format = "via [󰏗 $version]($style) "
display_private = false

# ── Command duration ─────────────────────────────────────────────
[cmd_duration]
style = "bold yellow"
format = "took [$duration]($style) "
min_time = 2_000
show_milliseconds = false

# ── Time (right prompt) ──────────────────────────────────────────
[time]
disabled = false
style = "dimmed white"
format = "[$time]($style)"
time_format = "%H:%M"
use_12hr = false

# ── Prompt character ─────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"
